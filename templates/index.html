<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Friend Matcher</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Friend Matcher</h1>
        <p>Find fans of the same team within 50 km.</p>
      </header>

      <section class="card">
        <h2>Your profile</h2>
        <form id="profile-form">
          <label>
            Name
            <input name="name" required />
          </label>

          <label>
            Favorite pro team
            <input name="team" required />
          </label>

          <div class="grid">
            <label>
              Latitude
              <input name="lat" type="number" step="0.0001" required />
            </label>
            <label>
              Longitude
              <input name="lon" type="number" step="0.0001" required />
            </label>
          </div>

          <fieldset>
            <legend>Fan questions (1-5)</legend>
            <label>
              1. How many games do you watch per month?
              <input name="q1" type="number" min="1" max="5" required />
            </label>
            <label>
              2. How many team jerseys do you own?
              <input name="q2" type="number" min="1" max="5" required />
            </label>
            <label>
              3. How often do you follow team news?
              <select name="q3" required>
                <option value="">Select one</option>
                <option value="1">Never</option>
                <option value="3">Sometimes</option>
                <option value="5">Daily</option>
              </select>
            </label>
            <fieldset>
              <legend>4. Would you attend a game this season?</legend>
              <label>
                <input type="radio" name="q4" value="5" required />
                Yes
              </label>
              <label>
                <input type="radio" name="q4" value="1" required />
                No
              </label>
            </fieldset>
            <label>
              5. How often do you use analytic stats to follow your team?
              <select name="q5" required>
                <option value="">Select one</option>
                <option value="1">Never</option>
                <option value="2">Monthly</option>
                <option value="4">Weekly</option>
                <option value="5">Daily</option>
              </select>
            </label>
            <label>
              6. How often do you talk about sports with others?
              <select name="q6" required>
                <option value="">Select one</option>
                <option value="1">Rarely</option>
                <option value="3">Sometimes</option>
                <option value="5">Often</option>
              </select>
            </label>
          </fieldset>
        


          <button type="submit">Find match</button>
        </form>
      </section>

      <section class="card" id="result" hidden>
        <h2>Match</h2>
        <div id="match-output"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
